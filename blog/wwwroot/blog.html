<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="windows-1251">
    <title></title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }

        .post {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

            .post h2 {
                margin-top: 0;
            }

        .date {
            color: #777;
            font-size: 0.9em;
        }

        .add-post-button {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background-color: #4CAF50;
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            line-height: 40px;
            border-radius: 50%;
            text-decoration: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: background-color 0.3s ease;
            z-index: 9999;
        }

            .add-post-button:hover {
                background-color: #45a049;
            }
    </style>
</head>
<body>

    <h1>Недавние посты</h1>
    <a href="add_post.html" class="add-post-button">+</a>
    <div id="posts"></div>

    <script>
        async function loadPosts() {
            try {
                const response = await fetch('/api/posts');
                if (!response.ok) throw new Error('Возникла ошибка при взаимодействии с сервером');
                const posts = await response.json();

                const container = document.getElementById('posts');
                container.innerHTML = '';

                posts.forEach(post => {
                    const postElement = document.createElement('div');
                    postElement.className = 'post';
                    postElement.innerHTML = `
                <h2>${post.title}</h2>
                <div class="date">${new Date(post.created_at).toLocaleString()}</div>
                <p>${post.contend}</p>
              `;
                    container.appendChild(postElement);
                });
            } catch (err) {
                document.getElementById('posts').innerHTML = `<p style="color:red;">${err.message}</p>`;
            }
        }

        window.addEventListener('DOMContentLoaded', loadPosts);
    </script>

</body>
</html>
