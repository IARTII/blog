<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="windows-1251">
    <title>Недавние посты</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }

        .post {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }

            .post h2 {
                margin-top: 0;
            }

        .date {
            color: #777;
            font-size: 0.9em;
        }

        .post img {
            max-width: 100%;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .add-post-button {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background-color: #4CAF50;
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            line-height: 40px;
            border-radius: 50%;
            text-decoration: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: background-color 0.3s ease;
            z-index: 9999;
        }

            .add-post-button:hover {
                background-color: #45a049;
            }

        .like-button {
            background-color: #eee;
            border: none;
            padding: 5px 10px;
            margin-top: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

            .like-button.liked {
                background-color: #ff4d4d;
                color: white;
            }

        .comment-button {
            background-color: #e0e0e0;
            border: none;
            padding: 5px 10px;
            margin-top: 10px;
            margin-left: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

            .comment-button:hover {
                background-color: #d0d0d0;
            }
    </style>
</head>
<body>

    <h1>Недавние посты</h1>
    <a href="add_post.html" class="add-post-button">+</a>
    <div id="posts"></div>

    <script>
        async function loadPosts() {
            try {
                const response = await fetch('/api/posts');
                if (!response.ok) throw new Error('Возникла ошибка при взаимодействии с сервером');
                const posts = await response.json();

                const container = document.getElementById('posts');
                container.innerHTML = '';

                for (const post of posts) {
                    const postElement = document.createElement('div');
                    postElement.className = 'post';

                    let imgHtml = '';
                    if (post.image_url) {
                        imgHtml = `<img src="${post.image_url}" alt="Изображение поста">`;
                    }

                    const postId = post.id;
                    const username = localStorage.getItem("username");

                    let likeCount = 0;
                    let liked = false;
                    let likeClass = '';

                    try {
                        const like_response = await fetch("/api/liked", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ postId, username })
                        });

                        if (!like_response.ok) throw new Error('Ошибка при получении лайков');

                        const like_info = await like_response.json();
                        likeCount = like_info.likeCount;
                        liked = like_info.liked;
                        likeClass = liked ? 'liked' : '';
                    } catch (err) {
                        console.error("Ошибка получения лайков:", err.message);
                    }

                    postElement.innerHTML = `
                        ${imgHtml}
                        <h2>${post.title}</h2>
                        <div class="date">${new Date(post.created_at).toLocaleString()}</div>
                        <p>${post.contend}</p>
                        <button class="like-button ${likeClass}" data-post-id="${postId}">
                            ❤️ Лайк (<span class="like-count">${likeCount}</span>)
                        </button>
                        <button class="comment-button" data-post-id="${postId}">
                            💬 Комментарии
                        </button>
                    `;
                    container.appendChild(postElement);
                }

                // Назначаем обработчики кликов на все кнопки лайков
                document.querySelectorAll('.like-button').forEach(button => {
                    button.addEventListener('click', async () => {
                        const postId = button.getAttribute('data-post-id');
                        const username = localStorage.getItem("username");

                        try {
                            const response = await fetch("/api/like_post", {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({ postId, username })
                            });

                            if (!response.ok) throw new Error("Ошибка при отправке лайка");

                            const result = await response.json();
                            const newCount = result.likeCount;
                            const liked = result.liked;

                            button.classList.toggle('liked', liked);
                            button.querySelector('.like-count').textContent = newCount;
                        } catch (err) {
                            console.error("Ошибка лайка:", err.message);
                        }
                    });
                });

                document.querySelectorAll('.comment-button').forEach(button => {
                    button.addEventListener('click', () => {
                        const postId = button.getAttribute('data-post-id');
                        // Пример: перейти на страницу комментариев
                        window.location.href = `/comments.html?postId=${postId}`;
                    });
                });

            } catch (err) {
                document.getElementById('posts').innerHTML = `<p style="color:red;">${err.message}</p>`;
            }
        }

        window.addEventListener('DOMContentLoaded', loadPosts);
    </script>


</body>
</html>
